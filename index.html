<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>NEXTFLIX</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{

background:#141414;

font-family:Arial;

}


.hero{

height:100vh;


background:
linear-gradient(

rgba(0,0,0,.75),

rgba(0,0,0,.75)

),

url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1600');

background-size:cover;

background-position:center;

}


.logo{

color:#E50914;

font-size:45px;

font-weight:900;

}


.card{

background:rgba(0,0,0,.80);

backdrop-filter:blur(10px);

}


</style>

</head>



<body>



<section class="hero">


<nav class="p-5 flex justify-between">


<div class="logo">

NEXTFLIX

</div>


<button
class="bg-red-600
px-5 py-2 rounded">

Sign In

</button>

</nav>





<div class="flex
justify-center
items-center
h-[80vh]">



<div class="card
p-10
rounded-lg
w-[400px]
max-w-[90%]">


<h1 class="text-3xl
font-bold
mb-6
text-white">

Welcome

</h1>



<input

id="email"

placeholder="Email"

class="w-full
mb-4
p-3
rounded
bg-zinc-800
text-white">



<input

id="password"

type="password"

placeholder="Password"

class="w-full
mb-4
p-3
rounded
bg-zinc-800
text-white">





<button

onclick="emailLogin()"

class="w-full
bg-red-600
p-3
rounded
font-bold">

Continue

</button>




<div class="text-center
text-zinc-400
mt-4">

OR

</div>



<button

onclick="googleLogin()"

class="w-full
bg-white
text-black
mt-3
p-3
rounded">

Google

</button>



<button

onclick="facebookLogin()"

class="w-full
bg-blue-600
mt-3
p-3
rounded">

Facebook

</button>



<button

onclick="twitterLogin()"

class="w-full
bg-black
border
mt-3
p-3
rounded">

X

</button>



<button

onclick="tiktokLogin()"

class="w-full
bg-pink-600
mt-3
p-3
rounded">

TikTok

</button>



</div>



</div>


</section>

<script>

function emailLogin(){

alert("Firebase Email Login");

}


function googleLogin(){

alert("Firebase Google");

}


function facebookLogin(){

alert("Firebase Facebook");

}



function twitterLogin(){

alert("Firebase X");

}



function tiktokLogin(){

alert(

"TikTok OIDC Required"

);

}



</script>


</body>

</html>
